{{- if .Values.customResourceDefinitions.create }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name:  microsoft-sql-server-beta-streams.streaming.sneaksanddata.com
spec:
  group: streaming.sneaksanddata.com
  scope: Namespaced
  names:
    plural: microsoft-sql-server-beta-streams
    singular: microsoft-sql-server-beta-stream
    kind: MicrosoftSqlServerBetaStream
    shortNames:
      - mssqlb-stream
  versions:
    - name: v1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Change Capture Interval
          type: string
          jsonPath: .spec.streamMode.changeCapture.changeCaptureInterval
        - name: Sink location
          type: string
          jsonPath: .spec.sink.targetTableFullName
        - name: Source schema
          type: string
          jsonPath: .spec.source.configuration.schemaName
        - name: Source table
          type: string
          jsonPath: .spec.source.configuration.tableName
        - name: Throughput shaper
          type: string
          jsonPath: .spec.throughput.shaperImpl
        - name: Phase
          type: string
          jsonPath: .status.phase
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                execution:
                  description: |
                    ExecutionSettings represents the execution settings for the stream controlled by Arcane Operator.
                    These settings should never be referenced by the plugin application and/or Arcane Framework,
                    but are meant to be used by the Arcane Operator alone for controlling the execution of the stream.
                  properties:
                    backfillJobTemplateRef:
                      description: BackfillJobTemplateRef represents a reference to
                        the job template.
                      properties:
                        apiVersion:
                          description: API version of the referent.
                          type: string
                        fieldPath:
                          description: |-
                            If referring to a piece of an object instead of an entire object, this string
                            should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                            For example, if the object reference is to a container within a pod, this would take on a value like:
                            "spec.containers{name}" (where "name" refers to the name of the container that triggered
                            the event) or if no container name is specified "spec.containers[2]" (container with
                            index 2 in this pod). This syntax is chosen only to have some well-defined way of
                            referencing a part of an object.
                          type: string
                        kind:
                          description: |-
                            Kind of the referent.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                          type: string
                        name:
                          description: |-
                            Name of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                        namespace:
                          description: |-
                            Namespace of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                          type: string
                        resourceVersion:
                          description: |-
                            Specific resourceVersion to which this reference is made, if any.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                          type: string
                        uid:
                          description: |-
                            UID of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    layoutVersion:
                      description: LayoutVersion represents the layout version of the
                        execution settings.
                      type: string
                      default: "v1"
                    streamingBackend:
                      description: StreamingBackend represents the backend configuration for streaming.
                      properties:
                        batch:
                          description: CronJobBackend represents the backend configuration
                            for batch processing.
                          properties:
                            jobTemplateRef:
                              description: JobTemplateRef represents a reference to
                                the job template.
                              properties:
                                apiVersion:
                                  description: API version of the referent.
                                  type: string
                                fieldPath:
                                  description: |-
                                    If referring to a piece of an object instead of an entire object, this string
                                    should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                                    For example, if the object reference is to a container within a pod, this would take on a value like:
                                    "spec.containers{name}" (where "name" refers to the name of the container that triggered
                                    the event) or if no container name is specified "spec.containers[2]" (container with
                                    index 2 in this pod). This syntax is chosen only to have some well-defined way of
                                    referencing a part of an object.
                                  type: string
                                kind:
                                  description: |-
                                    Kind of the referent.
                                    More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                                  type: string
                                name:
                                  description: |-
                                    Name of the referent.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                namespace:
                                  description: |-
                                    Namespace of the referent.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                                  type: string
                                resourceVersion:
                                  description: |-
                                    Specific resourceVersion to which this reference is made, if any.
                                    More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                                  type: string
                                uid:
                                  description: |-
                                    UID of the referent.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                                  type: string
                              type: object
                              x-kubernetes-map-type: atomic
                            schedule:
                              description: Schedule represents the cron schedule for
                                batch processing.
                              type: string
                          required:
                            - jobTemplateRef
                            - schedule
                          type: object
                        changeCapture:
                          description: BatchJobBackend represents the backend configuration
                            for real-time streaming.
                          properties:
                            jobTemplateRef:
                              description: JobTemplateRef represents a reference to
                                the job template.
                              properties:
                                apiVersion:
                                  description: API version of the referent.
                                  type: string
                                fieldPath:
                                  description: |-
                                    If referring to a piece of an object instead of an entire object, this string
                                    should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                                    For example, if the object reference is to a container within a pod, this would take on a value like:
                                    "spec.containers{name}" (where "name" refers to the name of the container that triggered
                                    the event) or if no container name is specified "spec.containers[2]" (container with
                                    index 2 in this pod). This syntax is chosen only to have some well-defined way of
                                    referencing a part of an object.
                                  type: string
                                kind:
                                  description: |-
                                    Kind of the referent.
                                    More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                                  type: string
                                name:
                                  description: |-
                                    Name of the referent.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                  type: string
                                namespace:
                                  description: |-
                                    Namespace of the referent.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                                  type: string
                                resourceVersion:
                                  description: |-
                                    Specific resourceVersion to which this reference is made, if any.
                                    More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                                  type: string
                                uid:
                                  description: |-
                                    UID of the referent.
                                    More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                                  type: string
                              type: object
                              x-kubernetes-map-type: atomic
                          required:
                            - changeCaptureInterval
                            - jobTemplateRef
                          type: object
                      type: object
                    suspended:
                      description: Suspended indicates whether the stream is suspended.
                      type: boolean
                  required:
                    - backfillJobTemplateRef
                    - layoutVersion
                    - streamingBackend
                    - suspended
                  type: object
                observability:
                  type: object
                  description: Configurations for enhancing logs and metrics produced by the plugin application
                  properties:
                    metricTags:
                      type: object
                      description: Additional tags to be assigned to all emitted metrics
                      additionalProperties:
                        type: string
                      default: { }
                  default:
                    metricTags: { }
                staging:
                  type: object
                  properties:
                    table:
                      type: object
                      description: Staging table creation properties
                      properties:
                        stagingTablePrefix:
                          type: string
                          description: Prefix to use for staging table names
                        maxRowsPerFile:
                          type: integer
                          description: Maximum number of rows to pack into a single staging table
                          default: 10000
                        stagingCatalogName:
                          description: Name of a Trino catalog used for staging
                          type: string
                        stagingSchemaName:
                          description: Schema name to use in the staging catalog
                          type: string
                        isUnifiedSchema:
                          description: Set to true to disable automatic schema migrations between stage and target.
                          type: boolean
                          default: true
                    icebergCatalog:
                      type: object
                      description: Iceberg REST Catalog connection properties
                      properties:
                        catalogProperties:
                          description: Additional configurations for the catalog sessions. Refer to Iceberg documentation for what can be provided here.
                          type: object
                          additionalProperties:
                            type: string
                        namespace:
                          type: string
                          description: Catalog namespace to use for all sessions
                        catalogUri:
                          type: string
                          description: Catalog server URL
                        warehouse:
                          type: string
                          description: Catalog warehouse to use for all sessions
                        maxCatalogInstanceLifetime:
                          type: string
                          description: Lifetime of RESTSessionCatalog instances
                          default: 3500 second
                streamMode:
                  type: object
                  description: Configuration for various modes of operation (backfill, change capture)
                  properties:
                    backfill:
                      type: object
                      description: Settings for backfill mode
                      properties:
                        backfillBehavior:
                          type: string
                          default: Overwrite
                        backfillStartDate:
                          type: string
                          description: |
                            The date and time to start backfilling data from, ISO format: 2026-01-01T00:00:00Z
                          nullable: true
                          default: null
                    changeCapture:
                      type: object
                      description: Settings for change capture mode
                      properties:
                        changeCaptureInterval:
                          type: string
                          default: 30 second
                        changeCaptureJitterVariance:
                          type: number
                          default: 0.1
                        changeCaptureJitterSeed:
                          type: number
                          default: 0
                sink:
                  type: object
                  description: Configuration for the Iceberg Sink
                  properties:
                    mergeServiceClient:
                      type: object
                      description: Merge service for the Iceberg Sink
                      properties:
                        connectionUrl:
                          type: string
                          description: Base URL for the Trino connection
                        credentialType:
                          type: object
                          nullable: true
                          description: Credential to use when connecting to a Trino cluster
                          default:
                            basic: null
                            anonymous: null
                          properties:
                            basic:
                              type: object
                              description: Basic auth
                              nullable: true
                              properties:
                                user:
                                  type: string
                                  nullable: true
                                  default: null
                                password:
                                  type: string
                                  nullable: true
                                  default: null
                            anonymous:
                              type: object
                              nullable: true
                              description: No auth credential
                              default: null
                        extraConnectionParameters:
                          type: object
                          description: Additional connection parameters to attach to the final connection string
                          additionalProperties:
                            type: string
                          default: { }
                        queryRetryMaxAttempts:
                          type: integer
                          default: 3
                        queryRetryScaleFactor:
                          type: number
                          default: 3.0
                        queryRetryOnMessageContents:
                          type: array
                          items:
                            type: string
                          default: [ ]
                        queryRetryBaseDuration:
                          type: string
                          default: 1 second
                        queryRetryMode:
                          type: object
                          properties:
                            never:
                              type: object
                              nullable: true
                              default: null
                            always:
                              type: object
                              nullable: true
                              default: null
                            backfillOnly:
                              type: object
                              nullable: true
                              default: null
                          default:
                            never: {}
                    targetTableProperties:
                      type: object
                      description: Additional configurations like partitioning, sort order etc. for a target table. These are not supported until 2.3 framework release.
                      default:
                        sortedBy: [ ]
                        parquetBloomFilterColumns: [ ]
                        format: PARQUET
                      properties:
                        sortedBy:
                          type: array
                          items:
                            type: string
                          default: [ ]
                        parquetBloomFilterColumns:
                          type: array
                          items:
                            type: string
                          default: [ ]
                        format:
                          type: string
                          enum:
                            - PARQUET
                            - ORC
                            - AVRO
                          default: PARQUET
                    targetTableFullName:
                      type: string
                      description: Name of the target table in the Iceberg catalog. Must be fully qualified as `catalog.schema.table`
                    maintenanceSettings:
                      type: object
                      properties:
                        targetOrphanFilesExpirationSettings:
                          type: object
                          properties:
                            batchThreshold:
                              type: integer
                              default: 60
                              description: Number of batches to accumulate before triggering EXPIRE ORPHAN FILES
                            retentionThreshold:
                              type: string
                              default: 6h
                              description: Maximum age of files to keep while running this procedure
                          default:
                            batchThreshold: 60
                            retentionThreshold: 6h
                        targetSnapshotExpirationSettings:
                          type: object
                          properties:
                            batchThreshold:
                              type: integer
                              default: 60
                              description: Number of batches to accumulate triggering EXPIRE SNAPSHOTS
                            retentionThreshold:
                              type: string
                              default: 6h
                              description: Maximum age of records in the transaction log to keep
                          default:
                            batchThreshold: 60
                            retentionThreshold: 6h
                        targetOptimizeSettings:
                          type: object
                          properties:
                            batchThreshold:
                              type: integer
                              default: 60
                              description: Number of batches to accumulate before triggering the OPTIMIZE
                            fileSizeThreshold:
                              type: string
                              default: 100MB
                              description: File size to target when running OPTIMIZE
                          default:
                            batchThreshold: 60
                            fileSizeThreshold: 100MB
                        targetAnalyzeSettings:
                          type: object
                          description: Configuration for ANALYZE (full refresh of extended statistics on the target)
                          properties:
                            batchThreshold:
                              type: integer
                              default: 180
                              description: Number of batches to accumulate before running the ANALYZE query.
                            includedColumns:
                              type: array
                              description: Columns to include in the ANALYZE query. If empty, ALL columns will be included.
                              items:
                                type: string
                              default: [ ]
                          default:
                            batchThreshold: 180
                            includedColumns: [ ]
                    icebergCatalog:
                      type: object
                      properties:
                        catalogProperties:
                          type: object
                          additionalProperties:
                            type: string
                        namespace:
                          type: string
                        catalogUri:
                          type: string
                        warehouse:
                          type: string
                        maxCatalogInstanceLifetime:
                          type: string
                          description: Lifetime of RESTSessionCatalog instances
                          default: 3500 second
                throughput:
                  type: object
                  description: Configuration for throughput management controls
                  nullable: true
                  default:
                    advisedChunkSize: 10000
                    advisedRate: 1000 per 15 second
                    advisedBurst: 1000
                    shaperImpl:
                      static: null
                      memoryBound:
                        fallbackStringTypeSizeEstimate: 50
                        objectTypeSizeEstimate: 4096
                        chunkCostScale: 1
                        chunkCostMax: 10
                        tableRowCountWeight: 0.02
                        tableSizeWeight: 0.02
                        tableSizeScaleFactor: 2
                  properties:
                    advisedChunkSize:
                      type: integer
                      description: Chunk size orientation to the stream throughput management engine. For all shapers except Static, this setting is treated as a computation baseline.
                      default: 10000
                    advisedRate:
                      type: string
                      description: Row intake rate. For all shapers except Static, this setting is treated as a computation baseline.
                      default: 100 per 1 second
                    advisedBurst:
                      type: integer
                      description: Row intake burst. For all shapers except Static, this setting is treated as a computation baseline.
                      default: 1000
                    shaperImpl:
                      type: object
                      nullable: true
                      description: Implementation of a throughput shaper
                      default:
                        static: null
                        memoryBound: null
                      properties:
                        static:
                          type: object
                          nullable: true
                          description: Enables StaticShaper, which provides fixed throughput according to advised values.
                          default: null
                        memoryBound:
                          type: object
                          nullable: true
                          description: Enables MemoryBoundShaper, which updates throughput based on available free memory vs chunk size, using sigmoid function for cost estimation. Advised values are used as a fallback and computation baseline.
                          properties:
                            fallbackStringTypeSizeEstimate:
                              type: integer
                              default: 50
                              description: Estimated length of a string or varchar data field in the source to use as a fallback when heuristic is not available.
                            objectTypeSizeEstimate:
                              type: integer
                              default: 4096
                              description: Estimated size of a binary data field in the source.
                            chunkCostScale:
                              type: integer
                              description: Scale for the chunk cost sigmoid estimator. Higher values result in less even distribution, leading to a more significant slowdown of larger chunks compared to smaller ones.
                              default: 1
                            chunkCostMax:
                              type: integer
                              description: Maximum cost that can be assigned to any chunk. Setting this to 1 will result in all chunks cost 0 or 1. Increasing this value will lead to a more noticeable slowdown for streams with large chunks.
                              default: 10
                            tableRowCountWeight:
                              type: number
                              description: Weight of a table row's count in cost estimation.
                              default: 0.05
                            tableSizeWeight:
                              type: number
                              description: Weight of a table's physical size in bytes in cost estimation.
                              default: 0.05
                            tableSizeScaleFactor:
                              type: integer
                              description: Scale for the memory cutoff sigmoid estimator. This affects how much memory is considered reserved when estimating chunk sizes. Higher values will result in more conservative cutoffs for large tables.
                              default: 2
                source:
                  type: object
                  properties:
                    fieldSelectionRule:
                      type: object
                      description: Select a subset of fields from source
                      default:
                        rule:
                          all: null
                          include: null
                          exclude: null
                      properties:
                        isServerSide:
                          type: boolean
                          description: If set to true, indicates that a source can provide field selection. This disables field filtering on the application level and relies on a source-specific filtering query instead.
                          default: true
                        essentialFields:
                          type: array
                          items:
                            type: string
                          default:
                            - sys_change_version
                            - sys_change_operation
                            - changetrackingversion
                            - arcane_merge_key
                        rule:
                          type: object
                          properties:
                            all:
                              type: object
                              nullable: true
                              description: Use all fields without filters.
                              default: { }
                            include:
                              type: object
                              description: Only use fields provided. You must specify mandatory fields like ARCANE_MERGE_KEY as well.
                              nullable: true
                              properties:
                                fields:
                                  type: array
                                  items:
                                    type: string
                              default: null
                            exclude:
                              type: object
                              description: Exclude provided fields.
                              nullable: true
                              properties:
                                fields:
                                  type: array
                                  items:
                                    type: string
                              default: null
                    buffering:
                      type: object
                      default:
                        enabled: true
                        strategy:
                          unbounded: null
                          buffered:
                            maxBufferSize: 10000
                      properties:
                        enabled:
                          type: boolean
                          description: If `true`, source row buffering will be enabled for this stream. Note that this might lead to Out-of-Memory failures if container doesn't have enough heap space.
                        strategy:
                          type: object
                          description: Buffering strategy to be applied, if enabled
                          properties:
                            unbounded:
                              type: object
                              nullable: true
                              description: Use entire available memory as source row buffer. Only use this when you expect to always have more memory than the application might ever need.
                              default: null
                            buffered:
                              type: object
                              nullable: true
                              description: Store up to `maxBufferSize` rows in application memory while waiting for the sink. Most preferable type of row buffering for stable operation.
                              properties:
                                maxBufferSize:
                                  type: integer
                                  default: 10000
                    configuration:
                      type: object
                      description: Configuration for SQL Server connection
                      properties:
                        extraConnectionParameters:
                          type: object
                          description: Extra parameters for SqlServer JDBC connection
                          additionalProperties:
                            type: string
                          default: {}
                        connectionUrl:
                          type: string
                          nullable: true
                          description: JDBC connection URL for Sql Server. Only use this for dev/test environments, utilize secret reference instead for live.
                          default: null
                        schemaName:
                          type: string
                          description: Schema name for source queries
                        tableName:
                          type: string
                          description: Source table name
                        fetchSize:
                          type: integer
                          nullable: true
                          default: 256
                          description: Fetch size for cursor advancement calls. Increasing this value will have effect until network packet size saturates. Only change this if really necessary.
                streamConfigurationSecretRef:
                  description: |
                    Name of the secret containing Sql Server and Trino connection information. Must contain the following: ARCANE_FRAMEWORK__MERGE_SERVICE_CONNECTION_URI (Trino) and ARCANE_FRAMEWORK__MICROSOFT_SQL_SERVER_CONNECTION_URI (SQL)
                  type: object
                  properties:
                    name:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                configurationHash:
                  description: ConfigurationHash represents the hash of the current configuration.
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - status
                      - type
                    properties:
                      message:
                        type: string
                      phase:
                        type: string
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
{{- end }}
